<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫院專業營養補充品手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --base-font-size: 16px; --print-font-size: 11px; }
        html { font-size: var(--base-font-size); }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; transition: font-size 0.2s; padding-bottom: 100px; }
        
        .bento-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; display: flex; flex-direction: column; position: relative; }
        .bento-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        
        .subcat-pill { font-size: 0.75rem; padding: 4px 12px; border-radius: 999px; background: white; color: #64748b; font-weight: 700; cursor: pointer; transition: 0.2s; border: 1px solid #e2e8f0; }
        .subcat-pill.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        
        .card-label { font-size: 0.7rem; padding: 1px 8px; border-radius: 4px; background: #eff6ff; color: #1d4ed8; font-weight: 700; margin-right: 4px; margin-bottom: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .add-cart-btn { position: absolute; top: 1.25rem; right: 1.25rem; z-index: 20; background: white; border: 1px solid #e2e8f0; padding: 0.4rem 0.8rem; border-radius: 10px; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .add-cart-btn.added { background: #1e293b; color: white; }
        .cart-float { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; }

        @media print {
            html, body { background: white !important; margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; }
            @page { size: A4 landscape; margin: 0.8cm; }
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            table { width: 100% !important; border-collapse: collapse !important; table-layout: fixed !important; }
            .print-table td, .print-table th { font-size: var(--print-font-size) !important; border: 1px solid black; padding: 5px; }
            .print-img { max-width: 80px !important; max-height: 80px !important; margin-top: 5px !important; display: block; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="mainApp" class="no-print">
        <nav class="glass-nav sticky top-0 z-50 px-4 py-3 bg-white/80 backdrop-blur-md border-b">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">Feng Yuan Hospital</span>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter">保健營養品目錄</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="adjustFont(2)" class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-xl font-bold">A+</button>
                    <button onclick="adjustFont(-2)" class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-xl font-bold">A-</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="mb-8 space-y-4">
                <input type="text" id="searchInput" oninput="filterData()" placeholder="搜尋品名、代碼、功效、關鍵字..." class="w-full p-5 rounded-2xl border-2 border-white bg-white shadow-xl focus:border-blue-500 focus:outline-none text-lg">
                <div id="categoryFilter" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
                <div class="bg-white/60 p-5 rounded-2xl border border-white shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">第二層：次分類篩選</p>
                    <div id="subCategoryCloud" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>

        <div class="cart-float">
            <button onclick="toggleCartModal()" class="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3">
                <span class="font-bold text-lg">📋 比較清單</span>
                <span id="cartCount" class="bg-blue-500 text-white text-xs w-6 h-6 flex items-center justify-center rounded-full font-black">0</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 no-print">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modalWindow" class="bg-white w-full max-w-4xl max-h-[90vh] rounded-[2.5rem] relative z-10 overflow-y-auto p-6 md:p-10 shadow-2xl">
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="printArea" class="hidden bg-white min-h-screen"></div>

    <script>
        const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycby9FT_rCftaktAW_JIF2wzEbrsRXo6aHvJKvpnp3RM5iR3D8xUQRSRgWmkloivVbFEG/exec"; 
        const IMAGE_PREFIX = "https://drive.google.com/thumbnail?id=";
        
        let allProducts = [];
        let activeCategory = '全部';
        let activeSubCat = null;
        let cart = new Set();
        let currentFontSize = 16;
        let printFontSize = 11;

        function clean(str) {
            if (!str) return "";
            return String(str).replace(/["']/g, "").trim();
        }

        async function fetchData() {
            try {
                const response = await fetch(GOOGLE_SHEET_API);
                const rawData = await response.json();
                allProducts = rawData.map(item => {
                    const p = {};
                    Object.keys(item).forEach(key => { p[clean(key)] = clean(item[key]); });
                    return p;
                });
                renderCategories();
                updateSubCategoryUI();
                filterData();
            } catch (e) { console.error("資料載入失敗", e); }
        }

        function renderCategories() {
            const cats = ['全部', ...new Set(allProducts.map(p => p.大分類).filter(Boolean))];
            document.getElementById('categoryFilter').innerHTML = cats.map(c => 
                `<button onclick="setCategory('${c}')" class="px-6 py-2 rounded-full border font-bold whitespace-nowrap ${c === activeCategory ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600'}">${c}</button>`).join('');
        }

        function setCategory(cat) {
            activeCategory = cat;
            activeSubCat = null;
            renderCategories();
            updateSubCategoryUI();
            filterData();
        }

        function updateSubCategoryUI() {
            const cloud = document.getElementById('subCategoryCloud');
            const scopeProducts = (activeCategory === '全部') ? allProducts : allProducts.filter(p => p.大分類 === activeCategory);
            const subCatSet = new Set();
            scopeProducts.forEach(p => {
                if (p.次分類) {
                    p.次分類.split(/[，,]/).forEach(s => {
                        const sClean = clean(s);
                        if (sClean) subCatSet.add(sClean);
                    });
                }
            });
            const sortedSubs = Array.from(subCatSet).sort();
            cloud.innerHTML = sortedSubs.map(s => `<span onclick="toggleSubCat('${s}')" class="subcat-pill ${activeSubCat === s ? 'active' : ''}">${s}</span>`).join('');
        }

        function toggleSubCat(tag) {
            activeSubCat = (activeSubCat === tag) ? null : tag;
            updateSubCategoryUI();
            filterData();
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchesCat = activeCategory === '全部' || p.大分類 === activeCategory;
                let matchesSub = true;
                if (activeSubCat) {
                    const subs = p.次分類 ? p.次分類.split(/[，,]/).map(s => clean(s)) : [];
                    matchesSub = subs.includes(activeSubCat);
                }
                const searchContent = [p.名稱, p.代碼, p.主要保健效果, p.關鍵字, p.適合對象, p.主要成分].join(' ').toLowerCase();
                const matchesQuery = !query || searchContent.includes(query);
                return matchesCat && matchesSub && matchesQuery;
            });
            renderProducts(filtered);
        }

        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map(p => {
                const isAdded = cart.has(p.代碼);
                return `
                <div class="bento-card p-5">
                    <button onclick="toggleCart('${p.代碼}')" class="add-cart-btn ${isAdded ? 'added' : ''}">${isAdded ? '已在清單' : '＋加入清單'}</button>
                    <div onclick="showDetail('${p.代碼}')" class="cursor-pointer">
                        <div class="flex flex-wrap mb-2 min-h-[24px] pr-24">${p.標籤 ? p.標籤.split(/[，,]/).map(t => `<span class="card-label">${clean(t)}</span>`).join('') : ''}</div>
                        <div class="aspect-square bg-slate-50 rounded-2xl mb-5 flex items-center justify-center p-4">
                            <img src="${IMAGE_PREFIX}${p.圖片ID}&sz=w600" class="max-h-full transition-transform hover:scale-110" loading="lazy">
                        </div>
                        <div class="text-[10px] font-bold text-blue-600 uppercase mb-1">${p.代碼}</div>
                        <h3 class="text-xl font-black text-slate-900 mb-2 leading-tight">${p.名稱}</h3>
                        <div class="mt-4 border-t pt-4 flex justify-between items-end">
                            <div><p class="text-[10px] text-slate-400 font-bold">民眾價</p><p class="text-xl font-black text-blue-600">$${p.民眾價}</p></div>
                            <div class="text-right"><p class="text-[10px] text-red-400 font-bold">員眷價</p><p class="text-xl font-black text-red-600">$${p.員眷價}</p></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleCart(id) { 
            if (cart.has(id)) cart.delete(id); else cart.add(id); 
            document.getElementById('cartCount').innerText = cart.size; 
            filterData(); 
        }

        function toggleCartModal() {
            if (cart.size === 0) { alert("清單是空的"); return; }
            const items = allProducts.filter(p => cart.has(p.代碼));
            document.getElementById('modalContent').innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-slate-900">📋 已選品項預覽</h2>
                    <button onclick="cart.clear(); document.getElementById('cartCount').innerText=0; filterData(); closeModal();" class="text-red-500 font-bold">全部清空</button>
                </div>
                <div class="space-y-3 mb-8 max-h-[40vh] overflow-y-auto pr-2 no-scrollbar">
                    ${items.map(p => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span><b>${p.代碼}</b> ${p.名稱}</span><button onclick="toggleCart('${p.代碼}'); toggleCartModal();">✕</button></div>`).join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="generatePrintView()" class="bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">產生 A4 對照表</button>
                    <button onclick="sendEmailAction()" class="bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg">發送信件給病人</button>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function generatePrintView() {
            const items = allProducts.filter(p => cart.has(p.代碼));
            const tableRows = items.map(p => `
                <tr>
                    <td><div style="font-weight: bold;">${p.代碼}<br>${p.名稱}</div><img src="${IMAGE_PREFIX}${p.圖片ID}&sz=w400" class="print-img"></td>
                    <td style="text-align:center;"><div style="color:#2563eb; font-weight:bold;">$${p.民眾價}</div><div style="color:#dc2626; font-weight:bold;">$${p.員眷價}</div></td>
                    <td>${p.主要成分}</td><td>${p.食用方法}</td><td>${p.適合對象 || p.適用對象}</td><td>${p.內容包裝規格}</td>
                </tr>`).join('');
            document.getElementById('printArea').innerHTML = `
                <div class="no-print flex justify-between items-center p-4 bg-slate-100 border-b">
                    <button onclick="closePrintView()" class="bg-slate-500 text-white px-6 py-2 rounded-xl">← 返回</button>
                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border">
                        <span class="text-xs font-bold text-slate-400">列印字級:</span>
                        <button onclick="adjustPrintFont(-1)" class="w-8 h-8 border rounded">A-</button>
                        <span id="p-indicator" class="font-black text-blue-600">${printFontSize}px</span>
                        <button onclick="adjustPrintFont(1)" class="w-8 h-8 border rounded">A+</button>
                    </div>
                    <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">確認列印</button>
                </div>
                <div style="padding: 20px;">
                    <h1 style="text-align:center; font-size:18px; font-weight:900; margin-bottom:10px;">營養補充品比較對照表</h1>
                    <table class="print-table" style="width:100%; border-collapse:collapse;">
                        <thead><tr><th>品名/代碼</th><th>價格(民/員)</th><th>主要成分</th><th>用法</th><th>對象</th><th>規格</th></tr></thead>
                        <tbody style="font-size: var(--print-font-size);">${tableRows}</tbody>
                    </table>
                </div>`;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('printArea').classList.remove('hidden');
            closeModal();
        }

        function closePrintView() { document.getElementById('mainApp').style.display = 'block'; document.getElementById('printArea').classList.add('hidden'); }
        function adjustPrintFont(delta) {
            printFontSize = Math.min(Math.max(printFontSize + delta, 8), 24);
            document.documentElement.style.setProperty('--print-font-size', printFontSize + 'px');
            document.getElementById('p-indicator').innerText = printFontSize + 'px';
        }

        // --- 核心修正：寄送 Email 增加適合對象與規格 ---
        async function sendEmailAction() {
            const email = prompt("請輸入收件人信箱：");
            if (!email || !email.includes('@')) return;
            const items = allProducts.filter(p => cart.has(p.代碼));
            const tableHtml = items.map(p => `
                <tr>
                    <td style="padding:10px; border:1px solid #ddd; width:20%;"><b>${p.代碼}</b><br>${p.名稱}</td>
                    <td style="padding:10px; border:1px solid #ddd; text-align:center; width:15%; color:#2563eb;"><b>$${p.民眾價}</b><br><span style="color:#dc2626">$${p.員眷價}</span></td>
                    <td style="padding:10px; border:1px solid #ddd; font-size:12px; width:30%;"><b>成分：</b>${p.主要成分}<br><b>用法：</b>${p.食用方法}</td>
                    <td style="padding:10px; border:1px solid #ddd; font-size:12px; width:35%;"><b>對象：</b>${p.適合對象 || p.適用對象}<br><b>規格：</b>${p.內容包裝規格}</td>
                </tr>`).join('');
            
            alert("發送中...");
            try {
                await fetch(GOOGLE_SHEET_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'sendEmail', email: email, tableHtml: tableHtml }) });
                alert("已送出請求。");
            } catch (e) { alert("發送錯誤"); }
        }

        function showDetail(id) {
            const p = allProducts.find(x => x.代碼 === id);
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col lg:flex-row gap-10 text-left">
                    <div class="lg:w-1/3"><img src="${IMAGE_PREFIX}${p.圖片ID}&sz=w800" class="w-full bg-slate-50 rounded-3xl p-6"></div>
                    <div class="lg:w-2/3">
                        <span class="text-blue-500 font-black text-xs uppercase">${p.代碼} | ${p.大分類}</span>
                        <h2 class="text-3xl font-black text-slate-900 mb-6">${p.名稱}</h2>
                        <div class="p-6 bg-blue-600 text-white rounded-3xl text-lg font-bold mb-6">${p.主要保健效果 || "專業營養補充"}</div>
                        <div class="grid md:grid-cols-2 gap-6 text-sm">
                            <div class="space-y-4">
                                <div><p class="text-slate-400 font-bold uppercase text-[10px]">主要成分</p><p class="font-bold text-slate-700">${p.主要成分}</p></div>
                                <div><p class="text-slate-400 font-bold uppercase text-[10px]">食用方法</p><p class="font-bold text-slate-700">${p.食用方法}</p></div>
                            </div>
                            <div class="space-y-4">
                                <div class="bg-red-50 p-4 rounded-xl border border-red-100"><p class="text-red-400 font-bold uppercase text-[10px]">注意事項</p><p class="font-bold text-red-700">${p.注意事項}</p></div>
                                <div><p class="text-slate-400 font-bold uppercase text-[10px]">規格/產地</p><p class="font-bold text-slate-700">${p.內容包裝規格} (${p.原產地})</p></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function adjustFont(delta) { 
            currentFontSize = Math.min(Math.max(currentFontSize + delta, 12), 32); 
            document.documentElement.style.setProperty('--base-font-size', currentFontSize + 'px'); 
        }

        window.onload = fetchData;
    </script>
</body>
</html>
